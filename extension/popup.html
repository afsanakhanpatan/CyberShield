<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberShield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <span class="logo-icon">🛡️</span>
        <span class="logo-text">CYBER<span class="cyan-accent">SHIELD</span></span>
      </div>
      <div class="status-indicator">
        <span class="pulse-dot"></span>
        <span id="status-text">ACTIVE</span>
      </div>
    </header>

    <div class="dashboard-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-scanned">0</div>
        <div class="stat-label">Total Messages Checked</div>
      </div>
      <div class="stat-card stat-threats">
        <div class="stat-value" id="stat-threats">0</div>
        <div class="stat-label">Scams Blocked</div>
      </div>
    </div>

    <section class="section-panel">
      <div class="section-title">Recent Detections</div>
      <div class="detection-list" id="detection-list">
        <div class="list-empty">No threats detected in this session. Secure browsing active.</div>
      </div>
    </section>

    <section class="section-panel settings-panel">
      <div class="section-title">Backend Configuration</div>
      <div class="form-group">
        <label for="backend-url">API Endpoint</label>
        <input type="text" id="backend-url" value="http://localhost:8090" placeholder="http://localhost:8090">
      </div>
      <button class="save-btn" id="save-settings">Save Config</button>
    </section>

    <footer class="app-footer">
      <div>Prakasam Police Hackathon 2026</div>
      <div>Mission Youth4</div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
